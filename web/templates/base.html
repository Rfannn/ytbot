<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bot Panel{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-4 py-3">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-purple-400">MultiBot</a>
            <div class="space-x-4">
                <a href="/" class="hover:text-purple-300">Home</a>
                <a href="/youtube" class="hover:text-purple-300">YouTube</a>
                <a href="/chat" class="hover:text-purple-300">ChatGPT</a>
                <a href="/admin" class="hover:text-purple-300">Admin</a>
            </div>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto p-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
