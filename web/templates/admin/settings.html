{% extends "base.html" %}
{% block title %}Admin Settings{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto py-8">
    <h1 class="text-3xl font-bold mb-6">⚙️ Bot Settings</h1>
    <form method="POST" action="/admin/settings" class="space-y-4">
        <div>
            <label class="block text-gray-400 mb-1">OpenAI API Key</label>
            <input type="password" name="openai_key" value="{{ settings.openai_key or '' }}"
                   class="w-full p-3 rounded bg-gray-800 border border-gray-700 focus:border-purple-500 outline-none">
        </div>
        <div>
            <label class="block text-gray-400 mb-1">Webhook URL</label>
            <input type="url" name="webhook_url" value="{{ settings.webhook_url or '' }}"
                   class="w-full p-3 rounded bg-gray-800 border border-gray-700 focus:border-purple-500 outline-none">
        </div>
        <button type="submit" class="p-3 bg-purple-600 rounded hover:bg-purple-500 font-semibold">Save Settings</button>
    </form>
    {% if saved %}
    <div class="mt-4 p-3 bg-green-900/50 border border-green-700 rounded text-green-300">Settings saved!</div>
    {% endif %}
</div>
{% endblock %}
